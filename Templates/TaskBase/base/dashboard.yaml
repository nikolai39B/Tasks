summaries:
  Sum: values.sum().round(2)
filters:
  and:
    - !sub .\filter\inThisFolder.yaml
    - !sub .\filter\isTask.yaml
    - !sub .\filter\notTemplate.yaml
formulas:
  Color: !sub .\formula\color.yaml
properties:
  file.name:
    displayName: Task
  note.effort_actual:
    displayName: Eff. (A)
  note.effort_projected:
    displayName: Eff. (P)
  note.priority:
    displayName: P
  note._formatted_effort:
    displayName: Effort
views:
  - !sub .\view\focused.yaml
  - type: cards
    name: Due
    filters:
      and:
        - _resolved == false
        - or:
            - note["due_date"] <= today() + duration("7d")
    groupBy:
      property: due_date
      direction: ASC
    order:
      - file.name
      - description
      - _formatted_effort
      - due_date
      - formula.Links
      - tags
      - _location
    sort:
      - property: priority
        direction: ASC
      - property: file.folder
        direction: ASC
    cardSize: 300
    image: formula.Color
    imageAspectRatio: 0.07
  - type: table
    name: Unresolved
    filters:
      and:
        - _resolved == false
    groupBy:
      property: due_date
      direction: ASC
    order:
      - file.name
      - priority
      - status
      - _formatted_effort
      - _external_links
      - description
    sort:
      - property: priority
        direction: ASC
      - property: file.folder
        direction: ASC
    summaries: {}
    columnSize:
      file.name: 268
      note.priority: 57
      note.status: 116
    rowHeight: medium
  - type: table
    name: Resolved
    filters:
      and:
        - _resolved == true
    groupBy:
      property: _resolution_date
      direction: DESC
    order:
      - file.name
      - priority
      - status
      - effort_actual
      - effort_projected
      - _external_links
      - description
    sort:
      - property: priority
        direction: ASC
      - property: file.folder
        direction: ASC
    summaries: {}
    columnSize:
      file.name: 268
      note.priority: 57
      note.effort_actual: 77
      note.effort_projected: 76
    rowHeight: medium
